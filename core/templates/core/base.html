<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Heist Academy{% endblock %}</title>
    <style>
        :root {
            --ink: #15110d;
            --paper: #f7f1e7;
            --muted: #74695c;
            --gold: #d6a84f;
            --red: #7f1d1d;
            --line: rgba(21, 17, 13, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: Arial, Helvetica, sans-serif;
            background: var(--paper);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .site-header {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            width: 100%;
            padding: 24px clamp(20px, 5vw, 72px);
        }

        .site-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            color: #fff8ec;
        }

        .brand {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0;
        }

        .nav-note {
            color: rgba(255, 248, 236, 0.72);
            font-size: 14px;
        }

        main {
            min-height: 100vh;
        }

        .hero {
            position: relative;
            display: grid;
            min-height: 100vh;
            overflow: hidden;
            background:
                linear-gradient(120deg, rgba(21, 17, 13, 0.94), rgba(52, 29, 26, 0.9)),
                repeating-linear-gradient(90deg, transparent 0 54px, rgba(214, 168, 79, 0.09) 54px 55px),
                var(--ink);
            color: #fff8ec;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(90deg, transparent 0 49px, rgba(255, 248, 236, 0.05) 49px 50px),
                linear-gradient(0deg, transparent 0 49px, rgba(255, 248, 236, 0.04) 49px 50px),
                linear-gradient(135deg, transparent 0 64%, rgba(214, 168, 79, 0.14) 64% 65%, transparent 65%);
            background-size: 50px 50px, 50px 50px, 100% 100%;
            opacity: 0.7;
        }

        .hero-inner {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.65fr);
            gap: clamp(32px, 5vw, 72px);
            align-items: center;
            width: min(1120px, calc(100% - 40px));
            margin: 0 auto;
            padding: 116px 0 56px;
        }

        .hero-kicker {
            margin: 0 0 18px;
            color: var(--gold);
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .hero-title {
            max-width: 760px;
            margin: 0;
            font-size: clamp(52px, 9vw, 112px);
            line-height: 0.92;
            letter-spacing: 0;
        }

        .hero-description {
            max-width: 690px;
            margin: 28px 0 0;
            color: rgba(255, 248, 236, 0.82);
            font-size: clamp(18px, 2vw, 23px);
            line-height: 1.55;
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 34px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0 22px;
            border: 1px solid rgba(255, 248, 236, 0.28);
            border-radius: 6px;
            color: #fff8ec;
            font-weight: 800;
            transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
        }

        .button:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 248, 236, 0.58);
        }

        .button-primary {
            border-color: var(--gold);
            background: var(--gold);
            color: #21170c;
        }

        .button-primary:hover {
            background: #e7bd67;
        }

        .mission-panel {
            border: 1px solid rgba(255, 248, 236, 0.2);
            border-radius: 8px;
            background: rgba(255, 248, 236, 0.08);
            backdrop-filter: blur(12px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.22);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255, 248, 236, 0.14);
            color: rgba(255, 248, 236, 0.7);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .module-list {
            display: grid;
            gap: 0;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .module-item {
            display: grid;
            gap: 6px;
            padding: 20px;
            border-bottom: 1px solid rgba(255, 248, 236, 0.12);
        }

        .module-item:last-child {
            border-bottom: 0;
        }

        .module-label {
            color: #fff8ec;
            font-size: 17px;
            font-weight: 800;
        }

        .module-copy {
            color: rgba(255, 248, 236, 0.68);
            line-height: 1.5;
        }

        .academy-sections {
            background: var(--paper);
            padding: clamp(56px, 8vw, 96px) 0;
        }

        .sections-inner {
            width: min(1120px, calc(100% - 40px));
            margin: 0 auto;
        }

        .section-kicker {
            margin: 0 0 12px;
            color: var(--red);
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .section-title {
            margin: 0;
            font-size: clamp(34px, 5vw, 58px);
            line-height: 1;
            letter-spacing: 0;
        }

        .section-description {
            max-width: 680px;
            margin: 18px 0 0;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.6;
        }

        .sections-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
            margin-top: 36px;
        }

        .section-card {
            display: flex;
            min-height: 220px;
            flex-direction: column;
            justify-content: space-between;
            gap: 22px;
            padding: 22px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fffaf1;
            box-shadow: 0 14px 34px rgba(21, 17, 13, 0.08);
        }

        .section-card h3 {
            margin: 0;
            font-size: 22px;
            line-height: 1.15;
        }

        .section-card p {
            margin: 12px 0 0;
            color: var(--muted);
            line-height: 1.5;
        }

        .section-link {
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            min-height: 40px;
            padding: 0 14px;
            border: 1px solid var(--line);
            border-radius: 6px;
            color: var(--red);
            font-weight: 800;
            transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
        }

        .section-link:hover {
            border-color: var(--red);
            background: var(--red);
            color: #fff8ec;
        }

        .section-link--soon {
            color: var(--muted);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .section-link--soon:hover {
            border-color: var(--line);
            background: transparent;
            color: var(--muted);
        }

        @media (max-width: 820px) {
            .site-header {
                padding: 20px;
            }

            .nav-note {
                display: none;
            }

            .hero-inner {
                grid-template-columns: 1fr;
                padding-top: 104px;
            }

            .hero-title {
                font-size: clamp(48px, 17vw, 76px);
            }

            .button {
                width: 100%;
            }

            .sections-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (min-width: 821px) and (max-width: 1080px) {
            .sections-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <nav class="site-nav">
            <a class="brand" href="{% url 'core:home' %}">Heist Academy</a>
            <span class="nav-note">Training portal</span>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
